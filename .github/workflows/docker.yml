name: Build and Publish Docker Container

# This workflow triggers whenever you push to the main branch
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Sets permissions so the workflow can push the image to GitHub's registry
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Logs into the GitHub Container Registry (GHCR) using the built-in GitHub token
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Automatically extracts your GitHub username and repo name to tag the image
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      # Builds the Dockerfile and pushes it to GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }} # Only push if it's a direct commit to main
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # These cache layers drastically speed up subsequent Rust compile times!
          cache-from: type=gha
          cache-to: type=gha,mode=max
